name: autofix.ci
on:
  push:
permissions:
  contents: write
  actions: write
jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: |
          yarn
          yarn prettier . --check
          echo $?
      - uses: autofix-ci/action@v1
        with:
          commit-message: "Apply Prettier format"
