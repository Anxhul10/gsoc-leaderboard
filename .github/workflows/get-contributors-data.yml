name: get-contributors-data

on:
  schedule:
    - cron: "30 1,6,11,16,21 * * *"  # every 5 hours
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Type of job to run'
        required: false
        default: 'regular'

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: 'yarn'

      - run: yarn

      - name: Run Scraper Script
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          JOB_TYPE: ${{ github.event.inputs.job_type || 'regular' }}
        run: node .github/scripts/get-contributors-data.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/contributions/

          if ! git diff --cached --quiet; then
            git commit -m "chore: update contributor statistics [skip ci]"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
