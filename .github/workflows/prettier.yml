name: autofix.ci
on:
  push:
permissions:
  contents: read
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - run: yarn
      - run: yarn prettier --write .
      - uses: autofix-ci/action@8bc06253bec489732e5f9c52884c7cace15c0160